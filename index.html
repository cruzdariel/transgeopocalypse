<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transgeopocalypse</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧟</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-family: Arial, sans-serif;
            text-align: center;
            font-size: 48px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .subtitle {
            font-family: Arial, sans-serif;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 40px;
        }
        .subtitle a {
            color: #fff;
            text-decoration: none;
        }
        .subtitle a:hover {
            text-decoration: underline;
        }
        .content-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .form-section {
            flex: 2;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .lost-found-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .section-header {
            font-family: Arial, sans-serif;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: 800px;
            border: none;
            background: #fff;
        }
        .lost-button {
            font-family: Arial, sans-serif;
            background-color: #ff0000;
            color: #fff;
            padding: 20px 40px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: inline-block;
            letter-spacing: 1px;
            border-radius: 0;
            transition: background-color 0.3s;
        }
        .lost-button:hover {
            background-color: #cc0000;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }
            .content-wrapper {
                flex-direction: column;
            }
            .section-header {
                font-size: 16px;
            }
            iframe {
                height: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YOU SURVIVED THE TRANSGEOPOCALYPSE</h1>
        <div class="subtitle">
            A WORLD ENDING COLLAB BY <a href="https://ucgeo.org/" target="_blank">UCGEO</a> + <a href="https://transit.rso.uchicago.edu" target="_blank">UCHITRANSIT</a>
        </div>

        <div class="content-wrapper">
            <div class="form-section">
                <div class="section-header">GET MERCH TO REMEMBER THE TIMES</div>
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe-nBFhlw0xINoDWcXxj0-Tk8cn0KHxdpb7YRox3JI9lmzirQ/viewform?embedded=true">Loading…</iframe>
            </div>

            <div class="lost-found-section">
                <div class="section-header">LOST SOMETHING?</div>
                <a href="mailto:noahl@uchicago.edu" class="lost-button">LOST AND FOUND</a>

                <div class="section-header" style="margin-top: 40px;">WE KNOW YOU TOOK PICS</div>
                <a href="https://uchicago.app.box.com/f/08d44f5fcca041b193d6c8747febd686" target="_blank" class="lost-button">UPLOAD THEM</a>
            </div>
        </div>
    </div>
</body>
</html>
